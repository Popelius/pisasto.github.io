<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Visa Generaattori</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Visa Generaattori</h1>

<div class="top-controls">

    <label>Kierroksia (Max 10):</label>
    <input type="number" id="roundCount" value="1" min="1" max="10">

    <label>Kysymyksiä / kierros (Max 30):</label>
    <input type="number" id="questionCount" value="10" min="1" max="30">

    <button onclick="createRounds()">
        Luo kierrokset
    </button>

</div>

<hr>

<div id="roundContainer"></div>

<br>

<button onclick="generateQuiz()">
    Luo Visa
</button>

<hr>

<div id="output"></div>

<script src="script.js"></script>

</body>
</html>
